<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Palette Run — Bourse aux palettes entre chauffeurs et entreprises." />
  <meta name="theme-color" content="#F5A623" />
  <title>Palette Run</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0A0A0A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px 24px;
      animation: fadeIn .8s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: min(520px, 90vw);
      height: auto;
      filter: drop-shadow(0 0 30px rgba(245,166,35,0.08));
    }

    .tagline {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #F5A623;
      color: #111827;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      padding: 18px 40px;
      border-radius: 16px;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 8px 32px rgba(245,166,35,0.4);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(245,166,35,0.55);
    }

    .btn-arrow { font-size: 20px; }
  </style>
</head>
<body>
  <div class="page">
    <img src="palette-run.png" alt="Palette Run" class="logo" />
    <div class="tagline">Bourse aux palettes</div>
    <a href="/palette-run/landing.html" class="btn">
      Découvrir l'app <span class="btn-arrow">→</span>
    </a>
  </div>
</body>
</html>
