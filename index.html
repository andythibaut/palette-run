<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Palette Run — Bourse aux palettes entre chauffeurs et entreprises." />
  <meta name="theme-color" content="#F5A623" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px 24px;
      animation: fadeIn .8s ease both;
      position: relative;
      z-index: 10;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: min(520px, 90vw);
      height: auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #F5A623;
      color: #111827;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      padding: 18px 40px;
      border-radius: 16px;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 8px 32px rgba(245,166,35,0.4);
      cursor: pointer;
      border: none;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(245,166,35,0.55);
    }

    .btn-arrow { font-size: 20px; }

    /* Grille de tuiles */
    #tiles {
      position: fixed;
      inset: 0;
      display: grid;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
    }

    .tile {
      background: #000;
      transform-origin: center bottom;
    }

    @keyframes tilefall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(120vh) rotate(var(--rot)); opacity: 0; }
    }

    .tile.falling {
      animation: tilefall var(--dur) cubic-bezier(.4, 0, .8, .6) var(--delay) forwards;
    }
  </style>
</head>
<body>

  <div id="tiles"></div>

  <div class="page">
    <img src="palette-run.png" alt="Palette Run" class="logo" />
    <button class="btn" onclick="startTransition()">
      Découvrir l'app <span class="btn-arrow">→</span>
    </button>
  </div>

  <script>
    const COLS = 8
    const ROWS = 6

    function buildGrid() {
      const tiles = document.getElementById("tiles")
      tiles.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`
      tiles.style.gridTemplateRows = `repeat(${ROWS}, 1fr)`
      for (let i = 0; i < COLS * ROWS; i++) {
        const t = document.createElement("div")
        t.className = "tile"
        t.dataset.index = i
        tiles.appendChild(t)
      }
    }

    function startTransition() {
      const tiles = document.getElementById("tiles")
      tiles.style.opacity = "1"
      tiles.style.pointerEvents = "all"

      const allTiles = Array.from(tiles.querySelectorAll(".tile"))

      // Melange aleatoire pour que les tuiles tombent dans un ordre naturel
      const shuffled = [...allTiles].sort(() => Math.random() - 0.5)

      shuffled.forEach((tile, i) => {
        const delay = i * 28
        const dur = 420 + Math.random() * 200
        const rot = (Math.random() - 0.5) * 30
        tile.style.setProperty("--delay", delay + "ms")
        tile.style.setProperty("--dur", dur + "ms")
        tile.style.setProperty("--rot", rot + "deg")
        tile.classList.add("falling")
      })

      // Redirection apres la fin de l'animation
      const total = shuffled.length * 28 + 650
      setTimeout(() => {
        window.location.href = "landing.html"
      }, total)
    }

    buildGrid()
  </script>
</body>
</html>
