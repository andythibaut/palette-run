<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Palette Run — Bourse aux palettes entre chauffeurs et entreprises." />
  <meta name="theme-color" content="#F5A623" />
  <title>Palette Run</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px 24px;
      animation: fadeIn .8s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: min(520px, 90vw);
      height: auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #F5A623;
      color: #111827;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      padding: 18px 40px;
      border-radius: 16px;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 8px 32px rgba(245,166,35,0.4);
      cursor: pointer;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(245,166,35,0.55);
    }
    .btn-arrow { font-size: 20px; }

    #canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0;
      transition: opacity .15s;
    }
    #canvas.active { opacity: 1; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="page" id="page">
    <img src="palette-run.png" alt="Palette Run" class="logo" />
    <a href="landing.html" class="btn" onclick="dissolve(event)">
      Découvrir l'app <span class="btn-arrow">→</span>
    </a>
  </div>

  <script>
    function dissolve(e) {
      e.preventDefault()

      const canvas = document.getElementById("canvas")
      const ctx = canvas.getContext("2d")
      canvas.width = window.innerWidth
      canvas.height = window.innerHeight
      canvas.classList.add("active")

      const COLORS = ["#F5A623", "#D4891A", "#FEF3C7", "#ffffff", "#FBBF24"]
      const COUNT = 280
      const particles = []

      const cx = canvas.width / 2
      const cy = canvas.height / 2

      for (let i = 0; i < COUNT; i++) {
        const angle = Math.random() * Math.PI * 2
        const radius = Math.random() * Math.min(canvas.width, canvas.height) * 0.38
        particles.push({
          x: cx + Math.cos(angle) * radius * Math.random(),
          y: cy + Math.sin(angle) * radius * Math.random(),
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6 - 1.5,
          size: Math.random() * 5 + 1.5,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          alpha: 1,
          decay: Math.random() * 0.018 + 0.008,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.15,
          shape: Math.random() > 0.5 ? "rect" : "circle"
        })
      }

      // Fade out page content
      document.getElementById("page").style.transition = "opacity .4s"
      document.getElementById("page").style.opacity = "0"

      let redirected = false
      const start = performance.now()

      function draw(now) {
        ctx.clearRect(0, 0, canvas.width, canvas.height)

        let alive = false
        for (const p of particles) {
          if (p.alpha <= 0) continue
          alive = true
          ctx.save()
          ctx.globalAlpha = p.alpha
          ctx.fillStyle = p.color
          ctx.translate(p.x, p.y)
          ctx.rotate(p.rotation)
          if (p.shape === "rect") {
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6)
          } else {
            ctx.beginPath()
            ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2)
            ctx.fill()
          }
          ctx.restore()

          p.x += p.vx
          p.y += p.vy
          p.vy += 0.08
          p.vx *= 0.98
          p.rotation += p.rotSpeed
          p.alpha -= p.decay
        }

        if (!redirected && now - start > 900) {
          redirected = true
          window.location.href = "landing.html"
        }

        if (alive) requestAnimationFrame(draw)
      }

      requestAnimationFrame(draw)
    }
  </script>
</body>
</html>
